function createAdminModal() {
const modalHtml = `
<div id="user-modal" style="display:none;">
  <input type="text" id="search-user" placeholder="Search Users">
  <ul id="user-list">
    <!-- Users from Firebase will be listed here -->
  </ul>
</div>`;
document.body.insertAdjacentHTML('beforeend', modalHtml);
document.getElementById('adm-total-users').onclick = async function() {
const modal = document.getElementById('user-modal');
modal.style.display = 'block';
const searchUserInput = document.getElementById('search-user');
const userList = document.getElementById('user-list');
searchUserInput.addEventListener('input', async function() {
const searchQuery = this.value.toLowerCase();
const users = await db.collection("users").get().then(snapshot => snapshot.docs.map(doc => doc.data()));
userList.innerHTML = users.filter(user => user.name.toLowerCase().includes(searchQuery))
  .map(user => `<li>${user.name}</li>`).join("" );
});
};
}
</script>

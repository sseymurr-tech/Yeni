<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updated Index</title>
    <script>
        // Removed demo bot messages
        // const DEMO_USERS = []; // DELETED

        // Removed addDemoMsg function
        // function addDemoMsg() { ... } // DELETED

        // Removed setInterval demoTimer function

        function renderLeaderboard() {
            // Updated rendering logic here
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.innerHTML = ''; // Clear existing leaderboard
            // Assuming we fetch users and scores from a server 
            fetch('/api/leaderboard')
                .then(response => response.json())
                .then(data => {
                    data.forEach(user => {
                        const userEntry = document.createElement('div');
                        userEntry.innerText = `${user.name}: ${user.score}`;
                        leaderboard.appendChild(userEntry);
                    });
                })
                .catch(error => console.error('Error fetching leaderboard:', error));
        }

        function fetchAdminUsers() {
            // Fetch and display admin users
            fetch('/api/admin-users')
                .then(response => response.json())
                .then(admins => {
                    const adminList = document.getElementById('admin-users');
                    adminList.innerHTML = ''; // Clear existing list
                    admins.forEach(admin => {
                        const adminEntry = document.createElement('div');
                        adminEntry.innerText = admin.name;
                        adminList.appendChild(adminEntry);
                    });
                })
                .catch(error => console.error('Error fetching admin users:', error));
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderLeaderboard(); // Call to render leaderboard
            fetchAdminUsers(); // Call to fetch and display admin users
        });
    </script>
</head>
<body>
    <h1>Welcome to the Application</h1>
    <div id="leaderboard"></div>
    <h2>Admin Users</h2>
    <div id="admin-users"></div>
</body>
</html>
